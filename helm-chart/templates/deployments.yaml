apiVersion: apps/v1
kind: Deployment
metadata:
  name: AWS-EKS-Flask-Deployment-app
  labels:
    app: AWS-EKS-Flask-Deployment-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: AWS-EKS-Flask-Deployment-app
  template:
    metadata:
      labels:
        app: AWS-EKS-Flask-Deployment-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: flask-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10